<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSubtle" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b100ff" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>
  </defs>

  <rect width="100" height="100" fill="transparent" />

  <g transform="translate(50,50) scale(0.9) translate(-50,-50)">
    
    <!-- Outer concentric circles representing the 'lens' rings -->
    <circle cx="50" cy="50" r="42" fill="none" stroke="url(#purpleGradient)" stroke-width="1.5" filter="url(#glowSubtle)" opacity="0.6"/>
    <circle cx="50" cy="50" r="35" fill="none" stroke="url(#cyanGradient)" stroke-width="2.5" filter="url(#neonGlow)" stroke-dasharray="10 4"/>
    
    <!-- Lens focal markings (crosshairs) -->
    <line x1="50" y1="2" x2="50" y2="12" stroke="#fff" stroke-width="2" filter="url(#glowSubtle)" opacity="0.8"/>
    <line x1="50" y1="88" x2="50" y2="98" stroke="#fff" stroke-width="2" filter="url(#glowSubtle)" opacity="0.8"/>
    <line x1="2" y1="50" x2="12" y2="50" stroke="#fff" stroke-width="2" filter="url(#glowSubtle)" opacity="0.8"/>
    <line x1="88" y1="50" x2="98" y2="50" stroke="#fff" stroke-width="2" filter="url(#glowSubtle)" opacity="0.8"/>

    <!-- The Eye / Inner Lens shape -->
    <path d="M 22 50 Q 50 25, 78 50 Q 50 75, 22 50 Z" fill="none" stroke="url(#cyanGradient)" stroke-width="3" filter="url(#neonGlow)"/>

    <!-- A rising financial chart breaking through the lens -->
    <path d="M 32 60 L 45 45 L 55 52 L 72 32" fill="none" stroke="url(#purpleGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)"/>
    
    <!-- Glowing data points on the chart -->
    <circle cx="32" cy="60" r="2.5" fill="#fff" filter="url(#glowSubtle)" />
    <circle cx="45" cy="45" r="2.5" fill="#fff" filter="url(#glowSubtle)" />
    <circle cx="55" cy="52" r="2.5" fill="#fff" filter="url(#glowSubtle)" />
    <circle cx="72" cy="32" r="3.5" fill="#fff" filter="url(#neonGlow)" />
    
    <!-- Central pupil / focus point -->
    <circle cx="50" cy="50" r="1.5" fill="#00f2fe" filter="url(#neonGlow)" opacity="0.5"/>
  </g>
</svg>
